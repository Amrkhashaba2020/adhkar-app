name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Build APK (local — no EAS quota used)
        working-directory: artifacts/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_NO_VCS: "1"
          EAS_SKIP_AUTO_FINGERPRINT: "1"
        run: eas build --platform android --profile preview --local --non-interactive --output ./adhkar-app.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: adhkar-app-v${{ github.run_number }}
          path: artifacts/mobile/adhkar-app.apk
          retention-days: 30
